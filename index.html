.nav button, .icon-btn, .primary, .secondary, .chip-btn {

.nav button {
min-height: 38px;
padding: 0 12px;
background: white;
color: var(--soft-ink);
font-weight: 800;

border-color: rgba(15, 125, 131, 0.45);

.primary, .secondary {
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
min-height: 42px;
padding: 0 15px;

text-decoration: none;
}
.primary { border-color: var(--night); background: var(--night); color: white; }
.secondary { background: white; color: var(--ink); }
.primary:hover, .secondary:hover, .icon-btn:hover, .property-card:hover, .chip-btn:hover {

}
.icon-btn {

place-items: center;
width: 42px;
height: 42px;
background: white;
color: var(--ink);
font-weight: 900;
}
main { width: min(1620px, 100%); margin: 0 auto; padding: 22px; }
.hero {

gap: 18px;
margin-bottom: 18px;
}
.hero-photo {

min-height: 520px;
overflow: hidden;
border-radius: 12px;
background:

url("https://images.unsplash.com/photo-1518391846015-55a9cc003b25?auto=format&fit=crop&w=1800&q=82") center/cover;
color: white;
box-shadow: var(--shadow);
}
.hero-copy {
position: absolute;
left: 34px;
right: 34px;
bottom: 34px;
max-width: 880px;
}
.eyebrow {
margin: 0 0 9px;
color: #9be4df;
font-size: 0.75rem;
font-weight: 900;
letter-spacing: 0;
text-transform: uppercase;
}
h1, h2, h3, p { margin-top: 0; }
h1 {
max-width: 980px;
margin-bottom: 16px;
font-size: clamp(2.5rem, 5.8vw, 6.2rem);
line-height: 0.94;
letter-spacing: 0;
}
.hero-copy p {
max-width: 760px;
margin-bottom: 0;
color: rgba(255, 255, 255, 0.88);
font-size: 1.03rem;
line-height: 1.7;
}
.hero-panel, .filters, .results, .detail-card, .market-card {
border: 1px solid var(--line);
border-radius: 12px;
background: var(--paper);
box-shadow: var(--shadow);
}
.hero-panel {
display: grid;
gap: 13px;
align-content: start;
padding: 18px;
}
.metric-tile {
padding: 18px;
border-radius: 10px;
background: var(--mist);
}
.metric-tile strong { display: block; font-size: 2rem; }
.metric-tile span { color: var(--muted); font-weight: 750; }
.search-card {
padding: 16px;
border: 1px solid var(--line);
border-radius: 10px;
background: white;
}
.search-grid {
display: grid;
grid-template-columns: 1.4fr 0.9fr 0.8fr;
gap: 10px;
}
.field { display: grid; gap: 7px; }
.field span { color: #344554; font-size: 0.79rem; font-weight: 850; }
.field input, .field select, .field textarea {
width: 100%;
min-height: 42px;
border: 1px solid var(--line);
border-radius: 10px;
background: #fbfdff;
color: var(--ink);
outline: none;
padding: 0 12px;
}
.field textarea { min-height: 92px; padding: 12px; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus {
border-color: var(--aqua);
box-shadow: 0 0 0 4px rgba(15, 125, 131, 0.12);
}
.layout {
display: grid;
grid-template-columns: 344px minmax(0, 1fr);
gap: 18px;
align-items: start;
}
.filters {
position: sticky;
top: 84px;
padding: 18px;
}
.panel-head {
display: flex;
align-items: center;
justify-content: space-between;
gap: 12px;
margin-bottom: 16px;
}
.panel-head h2 { margin: 0; font-size: 1.08rem; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.chip-btn {
min-height: 34px;
padding: 0 11px;
background: white;
color: var(--soft-ink);
font-size: 0.82rem;
font-weight: 850;
}
.switch-row {
display: flex;
align-items: center;
gap: 9px;
margin: 11px 0;
color: #344554;
font-size: 0.86rem;
font-weight: 800;
}
.switch-row input { width: 18px; height: 18px; accent-color: var(--aqua); }
.results { padding: 16px; min-width: 0; }
.result-head {
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 16px;
margin-bottom: 16px;
}
.result-head h2 { margin: 0 0 4px; font-size: 1.22rem; }
.result-head p { margin: 0; color: var(--muted); font-weight: 650; }
.view-toggle { display: flex; gap: 8px; }
.cards {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
gap: 14px;
}
.property-card {
overflow: hidden;
border: 1px solid var(--line);
border-radius: 12px;
background: white;
color: inherit;
text-align: left;
cursor: pointer;
animation: rise 280ms ease both;
}
.card-media {
position: relative;
height: 220px;
background: #dfe7ec;
}
.card-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
.badge-row {
position: absolute;
left: 12px;
right: 12px;
bottom: 12px;
display: flex;
justify-content: space-between;
gap: 8px;
}
.badge {
min-height: 28px;
padding: 6px 9px;
border-radius: 999px;
background: rgba(255, 255, 255, 0.91);
color: var(--ink);
font-size: 0.76rem;
font-weight: 900;
}
.save-badge.saved { background: var(--night); color: white; }
.card-body { padding: 15px; }
.card-title {
display: flex;
justify-content: space-between;
gap: 12px;
margin-bottom: 8px;
}
.card-title h3 { margin: 0; font-size: 1.1rem; line-height: 1.25; }
.price { color: var(--aqua); font-weight: 900; white-space: nowrap; }
.address { color: var(--muted); font-size: 0.88rem; font-weight: 650; }
.facts {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
margin: 13px 0;
}
.facts span {

border-radius: 9px;
background: var(--mist);
font-size: 0.78rem;
font-weight: 850;
text-align: center;

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {

background: #f0f5f6;
color: var(--soft-ink);
font-size: 0.74rem;
font-weight: 850;
}
.list-table {
width: 100%;
min-width: 860px;

}
.table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; }
th, td { padding: 14px 12px; border-bottom: 1px solid var(--line); text-align: left; }
th { background: #f8fbfc; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
tbody tr { cursor: pointer; transition: background 150ms ease; }
tbody tr:hover { background: #eef8f8; }

display: grid;

repeating-linear-gradient(90deg, transparent 0, transparent 47px, rgba(113,128,145,.13) 48px),
#f8fbfc;
}

position: absolute;

transform: rotate(-8deg);
}
.map-label {
position: absolute;

.pin.active, .pin:hover { background: var(--aqua); transform: translate(-50%, -50%) scale(1.35); }

.modal {
width: min(1180px, 100%);

background: white;

.modal-head {
position: sticky;

display: flex;
justify-content: space-between;

.modal-head h2 { margin: 0; }

.thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
.thumbs button { height: 84px; border: 2px solid transparent; border-radius: 10px; overflow: hidden; padding: 0; cursor: pointer; background: #edf3f5; }
.thumbs button.active { border-color: var(--aqua); }
.thumbs img { width: 100%; height: 100%; object-fit: cover; display: block; }
.modal-panel { display: grid; gap: 14px; align-content: start; }
.rent-panel { padding: 16px; border-radius: 12px; background: var(--night); color: white; }
.rent-panel strong { display: block; font-size: 2rem; }
.unit-list { display: grid; gap: 8px; }
.unit-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 12px; border: 1px solid var(--line); border-radius: 10px; }
.unit-row strong { display: block; }
.unit-row span { color: var(--muted); font-size: .82rem; font-weight: 750; }
.floor-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.floor-plan { padding: 14px; border: 1px solid var(--line); border-radius: 12px; background: #fbfdff; }
.floor-plan svg { width: 100%; height: auto; display: block; }
.amenities-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.amenities-grid span { padding: 10px; border-radius: 10px; background: var(--mist); font-weight: 800; }
.tour-form { display: grid; gap: 10px; }
.toast {
position: fixed;
z-index: 90;
right: 24px;
bottom: 24px;
max-width: 340px;
padding: 14px 16px;
border-radius: 12px;
background: var(--night);
color: white;
box-shadow: var(--shadow);
font-weight: 800;

@keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 1180px) {
.hero, .layout, .detail-band, .modal-body, .map-layout { grid-template-columns: 1fr; }

.market-row { grid-template-columns: repeat(2, 1fr); }

@media (max-width: 760px) {
.topbar, .result-head { align-items: stretch; flex-direction: column; }
.nav, .actions, .view-toggle { flex-wrap: wrap; }
main { padding: 12px; }
.hero-photo { min-height: 560px; }
.hero-copy { left: 20px; right: 20px; bottom: 20px; }
.hero-panel, .filters, .results, .detail-card { padding: 14px; }
.search-grid, .market-row, .facts, .amenities-grid { grid-template-columns: 1fr; }
.gallery-main { height: 330px; }
.thumbs { grid-template-columns: repeat(2, 1fr); }
}
</style>

function App() {
const [query, setQuery] = useState("");
const [market, setMarket] = useState("All");
const [beds, setBeds] = useState("Any");
const [maxRent, setMaxRent] = useState("");
const [amenity, setAmenity] = useState("");
const [view, setView] = useState("grid");
const [sort, setSort] = useState("featured");
const [selectedId, setSelectedId] = useState(properties[0].id);
const [modalId, setModalId] = useState("");
const [saved, setSaved] = useState(new Set());
const [tourFor, setTourFor] = useState("");
const [toast, setToast] = useState("");
const selected = properties.find((p) => p.id === selectedId) || properties[0];
const markets = ["All", ...new Set(properties.map((p) => p.market))];
const amenities = ["Pool", "Doorman", "Fitness", "Parking", "Waterfront", "Pet"];
const sampleUnits = properties.reduce((sum, p) => sum + p.unitsAvailable.length, 0);
const sourceLinks = properties.filter((p) => p.source).length;
const flaggedFeeds = properties.filter((p) => p.verified.includes("Needs")).length;
const filtered = useMemo(() => {
const q = query.trim().toLowerCase();
let rows = properties.filter((p) => {
const hay = [p.name, p.market, p.neighborhood, p.address, p.tags.join(" "), p.amenities.join(" ")].join(" ").toLowerCase();
return (!q || hay.includes(q)) &&
(market === "All" || p.market === market) &&
(beds === "Any" || p.beds.includes(beds)) &&
(!maxRent || p.rent <= Number(maxRent)) &&
(!amenity || hay.includes(amenity.toLowerCase()));
});
rows = [...rows].sort((a, b) => sort === "price" ? a.rent - b.rent : sort === "floors" ? b.floors - a.floors : b.units - a.units);
return rows;
}, [query, market, beds, maxRent, amenity, sort]);
const resultRows = view === "saved" ? filtered.filter((p) => saved.has(p.id)) : filtered;
const average = Math.round(filtered.reduce((sum, p) => sum + p.rent, 0) / Math.max(1, filtered.length));
const toggleSaved = (id) => setSaved((old) => {
const next = new Set(old);
next.has(id) ? next.delete(id) : next.add(id);
return next;
});
const requestTour = (id) => {
const property = properties.find((p) => p.id === id);
setTourFor("");
setToast(`Tour request prepared for ${property.name}. Connect this to email/SMS next.`);
setTimeout(() => setToast(""), 4200);
};
return html`
<div className="shell">
<header className="topbar">
<div className="brand"><div className="logo">PV</div><div><strong>PropertyVault</strong><span>Luxury rental search</span></div></div>
<nav className="nav" aria-label="Primary">
${["grid", "list", "map", "saved"].map((item) => html`<button className=${view === item ? "active" : ""} onClick=${() => setView(item)}>${item[0].toUpperCase()}${item.slice(1)}</button>`)}
</nav>
<button className="primary" onClick=${() => setTourFor(selected.id)}>Request tour</button>
</header>
<main>
<section className="hero">
<div className="hero-photo">
<div className="hero-copy">
<p className="eyebrow">Luxury rentals, finally in one command center</p>
<h1>Search the towers. Open the windows. Compare the layouts.</h1>
<p>PropertyVault brings polished discovery, apartment imagery, floor plans, leasing links, map search, and missing-data flags into one premium rental experience.</p>
</div>
</div>
<aside className="hero-panel">
<div className="search-card">
<div className="search-grid">
<label className="field"><span>Search</span><input value=${query} onInput=${(e) => setQuery(e.target.value)} placeholder="Newport, Hudson Yards, pool..." /></label>
<label className="field"><span>Market</span><select value=${market} onChange=${(e) => setMarket(e.target.value)}>${markets.map((m) => html`<option value=${m}>${m}</option>`)}</select></label>
<label className="field"><span>Max rent</span><input type="number" value=${maxRent} onInput=${(e) => setMaxRent(e.target.value)} placeholder="6500" /></label>
</div>
</div>
<div className="metric-tile"><strong>${filtered.length}</strong><span>properties matching now</span></div>
<div className="metric-tile"><strong>${money.format(average)}</strong><span>average starting rent</span></div>
<div className="metric-tile"><strong>${saved.size}</strong><span>saved properties</span></div>
</aside>
</section>
<section className="market-row">
<div className="market-card"><strong>${properties.length}</strong><span>featured luxury buildings</span></div>
<div className="market-card"><strong>${markets.length - 1}</strong><span>metro markets covered</span></div>
<div className="market-card"><strong>${sampleUnits}</strong><span>visible sample units</span></div>
<div className="market-card"><strong>100%</strong><span>gaps flagged clearly</span></div>
</section>
<section className="layout">
<aside className="filters">
<div className="panel-head"><h2>Refine search</h2><button className="secondary" onClick=${() => { setQuery(""); setMarket("All"); setBeds("Any"); setMaxRent(""); setAmenity(""); }}>Reset</button></div>
<label className="field"><span>Bedrooms</span><select value=${beds} onChange=${(e) => setBeds(e.target.value)}>${["Any", "Studio", "1 BR", "2 BR", "3 BR"].map((b) => html`<option value=${b}>${b}</option>`)}</select></label>
<label className="field"><span>Sort</span><select value=${sort} onChange=${(e) => setSort(e.target.value)}><option value="featured">Featured scale</option><option value="price">Lowest rent</option><option value="floors">Tallest towers</option></select></label>
<div className="chips">${amenities.map((a) => html`<button className=${amenity === a ? "chip-btn active" : "chip-btn"} onClick=${() => setAmenity(amenity === a ? "" : a)}>${a}</button>`)}</div>
<label className="switch-row"><input type="checkbox" checked=${view === "saved"} onChange=${(e) => setView(e.target.checked ? "saved" : "grid")} /> Show saved only</label>
<label className="field"><span>Source links to add next</span><textarea placeholder="Paste leasing pages you want tracked here"></textarea></label>
</aside>
<section className="results">
<div className="result-head">
<div><h2>${view === "saved" ? "Saved properties" : "Explore rentals"}</h2><p>${resultRows.length} results with apartment imagery, layouts, and verification notes.</p></div>
<div className="view-toggle">${["grid", "list", "map"].map((item) => html`<button className=${view === item ? "icon-btn active" : "icon-btn"} onClick=${() => setView(item)} aria-label=${item}>${item === "grid" ? "G" : item === "list" ? "L" : "M"}</button>`)}</div>
</div>
${view === "map" ? html`<${MapView} rows=${resultRows} selected=${selected} setSelectedId=${setSelectedId} open=${setModalId} />` : view === "list" ? html`<${ListView} rows=${resultRows} open=${setModalId} setSelectedId=${setSelectedId} />` : html`<${GridView} rows=${resultRows} open=${setModalId} saved=${saved} toggleSaved=${toggleSaved} />`}
</section>
</section>
<section className="detail-band">
<${SummaryCard} property=${selected} open=${setModalId} toggleSaved=${toggleSaved} saved=${saved.has(selected.id)} />
<div className="detail-card"><h2>Data honesty</h2><p>Exact current rent, unit status, and every apartment image should be connected to official leasing feeds next. Until then, PropertyVault separates verified leasing links from representative imagery and flagged fields.</p><div className="coverage-list"><div><span>Leasing links</span><strong>${sourceLinks} linked</strong></div><div><span>Needs live feed</span><strong>${flaggedFeeds} flagged</strong></div><div><span>Gallery support</span><strong>All cards</strong></div></div></div>
</section>
</main>
${modalId && html`<${DetailWindow} property=${properties.find((p) => p.id === modalId)} close=${() => setModalId("")} saved=${saved.has(modalId)} toggleSaved=${toggleSaved} requestTour=${setTourFor} />`}
${tourFor && html`<${TourWindow} property=${properties.find((p) => p.id === tourFor)} close=${() => setTourFor("")} submit=${requestTour} />`}
${toast && html`<div className="toast">${toast}</div>`}
</div>
`;
}
function GridView({ rows, open, saved, toggleSaved }) {
if (!rows.length) return html`<div className="detail-card"><h2>No matches yet</h2><p>Try clearing filters or searching another market.</p></div>`;
return html`<div className="cards">${rows.map((p) => html`<article className="property-card" onClick=${() => open(p.id)}><div className="card-media"><img src=${p.images[0]} alt=${`${p.name} apartment view`} loading="lazy" /><div className="badge-row"><span className="badge">${p.market}</span><button className=${saved.has(p.id) ? "badge save-badge saved" : "badge save-badge"} onClick=${(e) => { e.stopPropagation(); toggleSaved(p.id); }}>${saved.has(p.id) ? "Saved" : "Save"}</button></div></div><div className="card-body"><div className="card-title"><h3>${p.name}</h3><div className="price">${money.format(p.rent)}+</div></div><div className="address">${p.neighborhood} - ${p.address}</div><div className="facts"><span>${p.beds.join(", ")}</span><span>${p.sqft} sq ft</span><span>${p.floors} floors</span></div><div className="tag-row">${p.tags.slice(0, 4).map((t) => html`<span className="tag">${t}</span>`)}</div></div></article>`)}</div>`;
}
function ListView({ rows, open, setSelectedId }) {
return html`<div className="table-wrap"><table className="list-table"><thead><tr><th>Property</th><th>Market</th><th>Starting</th><th>Beds</th><th>Availability</th><th>Status</th></tr></thead><tbody>${rows.map((p) => html`<tr onClick=${() => { setSelectedId(p.id); open(p.id); }}><td><strong>${p.name}</strong><span>${p.address}</span></td><td>${p.market}</td><td>${money.format(p.rent)}</td><td>${p.beds.join(", ")}</td><td>${p.unitsAvailable.length} sample units</td><td>${p.verified}</td></tr>`)}</tbody></table></div>`;
}
function MapView({ rows, selected, setSelectedId, open }) {
const bounds = useMemo(() => {
const lats = rows.map((p) => p.lat), lons = rows.map((p) => p.lon);
return { minLat: Math.min(...lats), maxLat: Math.max(...lats), minLon: Math.min(...lons), maxLon: Math.max(...lons) };
}, [rows]);
const project = (p) => ({ x: ((p.lon - bounds.minLon) / (bounds.maxLon - bounds.minLon || 1)) * 100, y: 100 - ((p.lat - bounds.minLat) / (bounds.maxLat - bounds.minLat || 1)) * 100 });
return html`<div className="map-layout"><div className="map-canvas"><div className="map-river"></div><div className="map-label manhattan">Manhattan</div><div className="map-label jersey">Jersey City</div>${rows.map((p) => { const pos = project(p); return html`<button className=${selected.id === p.id ? "pin active" : "pin"} style=${{ left: `${pos.x}%`, top: `${pos.y}%` }} title=${p.name} onClick=${() => setSelectedId(p.id)}></button>`; })}</div><aside className="map-side"><img src=${selected.images[0]} alt=${selected.name} /><h3>${selected.name}</h3><p>${selected.neighborhood} - ${money.format(selected.rent)} starting rent.</p><button className="primary" onClick=${() => open(selected.id)}>Open property window</button></aside></div>`;
}
function SummaryCard({ property, open, saved, toggleSaved }) {
return html`<article className="detail-card"><div className="card-title"><div><h2>${property.name}</h2><p className="address">${property.neighborhood} - ${property.address}</p></div><div className="price">${money.format(property.rent)}+</div></div><div className="facts"><span>${property.units} homes</span><span>${property.floors} floors</span><span>${property.baths} baths</span></div><div className="tag-row">${property.amenities.slice(0, 6).map((a) => html`<span className="tag">${a}</span>`)}</div><div style=${{display:"flex", gap:"8px", marginTop:"16px", flexWrap:"wrap"}}><button className="primary" onClick=${() => open(property.id)}>View property</button><button className="secondary" onClick=${() => toggleSaved(property.id)}>${saved ? "Saved" : "Save property"}</button></div></article>`;
}
function FloorPlan({ type }) {
const wide = type.includes("2") || type.includes("3");
return html`<svg viewBox="0 0 520 320" role="img" aria-label=${`${type} floor plan`}><rect x="8" y="8" width="504" height="304" rx="18" fill="#eef4f8" stroke="#b8c7d2" strokeWidth="4"/><rect x="34" y="34" width=${wide ? "210" : "175"} height="128" rx="10" fill="#ffffff" stroke="#8aa0ae" strokeWidth="3"/><text x="52" y="96" fill="#31404f" fontSize="18" fontWeight="800">Living</text><rect x=${wide ? "262" : "224"} y="34" width=${wide ? "112" : "124"} height="128" rx="10" fill="#ffffff" stroke="#8aa0ae" strokeWidth="3"/><text x=${wide ? "282" : "244"} y="96" fill="#31404f" fontSize="18" fontWeight="800">Kitchen</text><rect x="34" y="184" width="150" height="96" rx="10" fill="#ffffff" stroke="#8aa0ae" strokeWidth="3"/><text x="54" y="238" fill="#31404f" fontSize="18" fontWeight="800">Bath</text><rect x="206" y="184" width="132" height="96" rx="10" fill="#ffffff" stroke="#8aa0ae" strokeWidth="3"/><text x="226" y="238" fill="#31404f" fontSize="18" fontWeight="800">Bed</text>${wide && html`<rect x="360" y="184" width="126" height="96" rx="10" fill="#ffffff" stroke="#8aa0ae" strokeWidth="3"/><text x="378" y="238" fill="#31404f" fontSize="18" fontWeight="800">Bed 2</text>`}<path d="M34 162 H488" stroke="#b56f2d" strokeWidth="6" strokeLinecap="round"/><text x="372" y="84" fill="#0f7d83" fontSize="15" fontWeight="800">Window wall</text></svg>`;
}
function DetailWindow({ property, close, saved, toggleSaved, requestTour }) {
const [imageIndex, setImageIndex] = useState(0);
const [plan, setPlan] = useState(property.unitsAvailable[0][0]);
return html`<div className="modal-backdrop" role="presentation"><section className="modal" role="dialog" aria-modal="true" aria-label=${property.name}><div className="modal-head"><div><h2>${property.name}</h2><p className="address">${property.neighborhood} - ${property.address}</p></div><div className="actions"><button className="secondary" onClick=${() => toggleSaved(property.id)}>${saved ? "Saved" : "Save"}</button><button className="icon-btn" onClick=${close} aria-label="Close">X</button></div></div><div className="modal-body"><div><div className="gallery-main"><img src=${property.images[imageIndex]} alt=${`${property.name} gallery ${imageIndex + 1}`} /></div><div className="thumbs">${property.images.map((src, i) => html`<button className=${i === imageIndex ? "active" : ""} onClick=${() => setImageIndex(i)} aria-label=${`Image ${i + 1}`}><img src=${src} alt="" /></button>`)}</div><h3>Floor plans</h3><div className="floor-tabs">${property.unitsAvailable.map((u) => html`<button className=${plan === u[0] ? "chip-btn active" : "chip-btn"} onClick=${() => setPlan(u[0])}>${u[0]}</button>`)}</div><div className="floor-plan"><${FloorPlan} type=${plan} /></div></div><aside className="modal-panel"><div className="rent-panel"><strong>${money.format(property.rent)}+</strong><span>starting monthly rent</span></div><div><h3>Available homes</h3><div className="unit-list">${property.unitsAvailable.map((u) => html`<div className="unit-row"><div><strong>${u[0]} Residence ${u[1]}</strong><span>${u[3]} sq ft - Available ${u[4]}</span></div><strong>${money.format(u[2])}</strong></div>`)}</div></div><div><h3>Amenities</h3><div className="amenities-grid">${property.amenities.map((a) => html`<span>${a}</span>`)}</div></div><div className="actions" style=${{flexWrap:"wrap"}}><a className="primary" href=${property.source} target="_blank" rel="noreferrer">Open leasing site</a><button className="secondary" onClick=${() => requestTour(property.id)}>Request tour</button></div><p className="address">${property.verified}. Images are representative until direct owner feeds are connected.</p></aside></div></section></div>`;
}
function TourWindow({ property, close, submit }) {
return html`<div className="modal-backdrop"><section className="modal" style=${{maxWidth:"560px"}} role="dialog" aria-modal="true" aria-label="Request tour"><div className="modal-head"><h2>Request a tour</h2><button className="icon-btn" onClick=${close} aria-label="Close">X</button></div><div className="detail-card"><p>${property.name} - ${property.neighborhood}</p><form className="tour-form" onSubmit=${(e) => { e.preventDefault(); submit(property.id); }}><label className="field"><span>Name</span><input required placeholder="Your name" /></label><label className="field"><span>Email</span><input required type="email" placeholder="you@example.com" /></label><label className="field"><span>Preferred time</span><select><option>Today evening</option><option>Tomorrow morning</option><option>This weekend</option></select></label><button className="primary" type="submit">Prepare request</button></form></div></section></div>`;
}
createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
