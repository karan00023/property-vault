      @keyframes liftIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React, { useEffect, useMemo, useState } from "react";
      import { createRoot } from "react-dom/client";
      import htm from "htm";

      const html = htm.bind(React.createElement);
      const NYC = "https://data.cityofnewyork.us/resource/64uk-42ks.json";
      const OVERPASS = "https://overpass-api.de/api/interpreter";
      const money = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
      const num = new Intl.NumberFormat("en-US");
      const bedroomOptions = [["studio", "Studio"], ["oneBed", "1 BR"], ["twoBed", "2 BR"]];
      const emptySummary = { totalProperties: 0, withKnownLeasingSource: 0, flaggedForVerification: 0, byRegion: {}, caveat: "Public building inventory is loading. Live availability and asking rents are flagged where missing." };
      const knownSources = [
        { match: /journal/i, name: "Journal Squared", url: "https://www.journaljc.com/availability", amenities: ["PATH access", "Rooftop lounge", "Fitness center", "Doorman"] },
        { match: /newport|town square/i, name: "Newport Rentals", url: "https://www.newportrentals.com/apartments-jersey-city-for-rent/", amenities: ["Waterfront", "PATH access", "Fitness center", "Pet friendly"] },
        { match: /portside/i, name: "Portside Towers", url: "https://www.equityapartments.com/new-york-city/jersey-city/portside-towers-apartments", amenities: ["Waterfront", "Garage parking", "Concierge", "Fitness center"] },
        { match: /sky/i, name: "Sky", url: "https://www.skynewyork.com/", amenities: ["Hudson River views", "Pool", "Fitness club", "Doorman"] },
        { match: /mima/i, name: "MiMA", url: "https://www.mimarentals.com/", amenities: ["Doorman", "Fitness club", "Theater District", "Pet friendly"] },
        { match: /eugene/i, name: "The Eugene", url: "https://www.theeugenenyc.com/", amenities: ["Hudson Yards", "Rooftop terrace", "Fitness center", "Doorman"] }
      ];
      const boxes = [
        ["Hudson Yards", [-74.008, 40.748, -73.99, 40.762]], ["Midtown West", [-74.006, 40.76, -73.985, 40.774]],
        ["Midtown East", [-73.985, 40.748, -73.958, 40.766]], ["Financial District", [-74.018, 40.7, -73.995, 40.714]],
        ["Battery Park City", [-74.02, 40.705, -74.01, 40.718]], ["Upper West Side", [-73.99, 40.77, -73.958, 40.802]],
        ["Upper East Side", [-73.965, 40.765, -73.935, 40.795]], ["Downtown Brooklyn", [-74, 40.686, -73.974, 40.7]],
        ["Long Island City", [-73.965, 40.735, -73.93, 40.76]], ["Downtown Jersey City", [-74.055, 40.706, -74.025, 40.735]]
      ];
      const fallback = [
        ["fallback-journal", "Journal Squared", "36 Journal Square Plaza", "Jersey City", "Downtown JC", "Journal Square", 40.7335, -74.0624, 68, 1840, "https://www.journaljc.com/availability"],
        ["fallback-newport", "Newport Rentals", "121 Town Square Place", "Jersey City", "Downtown JC", "Downtown Jersey City", 40.7277, -74.0338, 35, 900, "https://www.newportrentals.com/apartments-jersey-city-for-rent/"],
        ["fallback-57", "217 West 57th Street", "217 West 57th Street", "New York", "Manhattan", "Midtown West", 40.7663, -73.9809, 98, 179, ""]
      ].map(([id, name, address, city, region, neighborhood, latitude, longitude, floors, units, leasingUrl]) => {
        const rentBand = rents(region, floors, units, neighborhood);
        return { id, name, address, city, region, neighborhood, latitude, longitude, floors, units, yearBuilt: null, owner: "", source: "Curated fallback", sourceUrl: leasingUrl || "https://data.cityofnewyork.us/Housing-Development/MapPLUTO/64uk-42ks", leasingUrl, rentBand, amenities: ["High-rise", "Elevator", "Residential"], tags: [region, neighborhood, "high-rise"], dataQuality: { buildingInventory: "curated fallback", liveRentFeed: leasingUrl ? "known leasing source" : "missing", needsVerification: ["live unit availability", "current asking rents"] } };
      });

      const n = (v, f = 0) => Number.isFinite(Number(v)) ? Number(v) : f;
      const title = (v) => String(v || "").toLowerCase().replace(/\b[a-z]/g, (m) => m.toUpperCase());
      function hood(lon, lat, fallback) {
        const hit = boxes.find(([, b]) => lon >= b[0] && lon <= b[2] && lat >= b[1] && lat <= b[3]);
        return hit?.[0] || fallback;
      }
      function rents(region, floors, units, neighborhood) {
        const premium = region === "Manhattan" || /Hudson|Financial|Battery|Midtown|Downtown Jersey/i.test(neighborhood);
        const lift = Math.min(1800, Math.max(0, floors - 20) * 45) + Math.min(900, Math.max(0, (units || 150) - 200) * 1.35);
        return { studio: Math.round(((premium ? 3600 : 2850) + lift) / 50) * 50, oneBed: Math.round(((premium ? 4700 : 3600) + lift) / 50) * 50, twoBed: Math.round(((premium ? 6900 : 5200) + lift) / 50) * 50 };
      }
      function source(record) {
        const found = knownSources.find((s) => s.match.test(`${record.name} ${record.address} ${record.owner}`));
        if (!found) return record;
        return { ...record, name: found.name, leasingUrl: found.url, amenities: [...new Set([...found.amenities, ...record.amenities])], dataQuality: { ...record.dataQuality, liveRentFeed: "known leasing source", needsVerification: record.dataQuality.needsVerification.filter((x) => x !== "live unit availability") } };
      }
      function summarize(properties, generatedAt, prefix = "Building inventory is generated") {
        const byRegion = properties.reduce((acc, p) => ((acc[p.region] = (acc[p.region] || 0) + 1), acc), {});
        return { generatedAt, totalProperties: properties.length, withKnownLeasingSource: properties.filter((p) => p.leasingUrl).length, flaggedForVerification: properties.filter((p) => p.dataQuality.needsVerification.length).length, byRegion, caveat: `${prefix} from public parcel/map data. Live unit availability and asking rents require direct leasing feeds or owner permission and are flagged where missing.` };
      }
      async function loadData() {
        const generatedAt = new Date().toISOString();
        try {
          const params = new URLSearchParams({ "$limit": "50000", "$select": "bbl,address,borough,ownername,latitude,longitude,numfloors,unitsres,yearbuilt,bldgclass", "$where": "numfloors >= 20 AND unitsres > 0 AND latitude IS NOT NULL AND longitude IS NOT NULL", "$order": "numfloors DESC, unitsres DESC" });
          const nycRows = await (await fetch(`${NYC}?${params}`)).json();
          const nyc = nycRows.map((row) => {
            const lat = n(row.latitude), lon = n(row.longitude), floors = n(row.numfloors), units = n(row.unitsres);
            const region = row.borough || "NYC", neighborhood = hood(lon, lat, region), address = title(row.address);
            return source({ id: `nyc-${row.bbl}`, name: address || `${region} high-rise`, address, city: "New York", region, neighborhood, latitude: lat, longitude: lon, floors, units, yearBuilt: n(row.yearbuilt, null), owner: title(row.ownername), source: "NYC MapPLUTO", sourceUrl: "https://data.cityofnewyork.us/Housing-Development/MapPLUTO/64uk-42ks", leasingUrl: "", rentBand: rents(region, floors, units, neighborhood), amenities: ["High-rise", "Elevator", "Residential"], tags: [region, neighborhood, floors >= 40 ? "supertall rental candidate" : "high-rise"], dataQuality: { buildingInventory: "verified public parcel data", liveRentFeed: "missing", needsVerification: ["live unit availability", "current asking rents"] } });
          });
          const overpass = `[out:json][timeout:30];(way["building"]["building:levels"](40.706,-74.055,40.735,-74.025);relation["building"]["building:levels"](40.706,-74.055,40.735,-74.025););out center tags;`;
          const jcRows = (await (await fetch(`${OVERPASS}?data=${encodeURIComponent(overpass)}`)).json()).elements || [];
          const jc = jcRows.map((el) => ({ el, floors: n(el.tags?.["building:levels"]), lat: n(el.center?.lat ?? el.lat), lon: n(el.center?.lon ?? el.lon) })).filter((x) => x.floors >= 12 && x.lat && x.lon).map(({ el, floors, lat, lon }) => {
            const name = el.tags?.name || [el.tags?.["addr:housenumber"], el.tags?.["addr:street"]].filter(Boolean).join(" ") || `Downtown JC high-rise ${el.id}`;
            const address = [el.tags?.["addr:housenumber"], el.tags?.["addr:street"]].filter(Boolean).join(" ") || "Downtown Jersey City";
            const units = n(el.tags?.["building:flats"], null), neighborhood = "Downtown Jersey City";
            return source({ id: `jc-${el.type}-${el.id}`, name: title(name), address: title(address), city: "Jersey City", region: "Downtown JC", neighborhood, latitude: lat, longitude: lon, floors, units, yearBuilt: null, owner: "", source: "OpenStreetMap via Overpass", sourceUrl: "https://www.openstreetmap.org/", leasingUrl: "", rentBand: rents("Jersey City", floors, units || 150, neighborhood), amenities: ["High-rise", "Transit access", "Hudson waterfront area"], tags: ["Downtown JC", floors >= 40 ? "skyline tower" : "high-rise"], dataQuality: { buildingInventory: "open map building tag", liveRentFeed: "missing", needsVerification: ["live unit availability", "current asking rents", units ? "" : "residential unit count", "official parcel cross-check"].filter(Boolean) } });
          });
          const map = new Map([...nyc, ...jc].map((p) => [p.id, p]));
          const properties = [...map.values()].sort((a, b) => (a.region === "Manhattan" ? -1 : b.region === "Manhattan" ? 1 : b.floors - a.floors || (b.units || 0) - (a.units || 0)));
          return { properties, generatedAt, coverageSummary: summarize(properties, generatedAt), error: "" };
        } catch (err) {
          return { properties: fallback, generatedAt, coverageSummary: summarize(fallback, generatedAt, "Fallback inventory is shown"), error: err.message };
        }
      }
      function csv(rows) {
        const headers = ["name","address","city","region","neighborhood","floors","units","studio","oneBed","twoBed","leasingUrl","source","flags"];
        const esc = (v) => `"${String(v ?? "").replaceAll('"', '""')}"`;
        const data = [headers.join(","), ...rows.map((r) => headers.map((h) => esc(["studio","oneBed","twoBed"].includes(h) ? r.rentBand[h] : h === "flags" ? r.dataQuality.needsVerification.join("; ") : r[h])).join(","))].join("\n");
        const url = URL.createObjectURL(new Blob([data], { type: "text/csv" }));
        Object.assign(document.createElement("a"), { href: url, download: "property-vault-high-rise-inventory.csv" }).click();
        URL.revokeObjectURL(url);
      }
      function App() {
        const [data, setData] = useState({ properties: [], generatedAt: "", coverageSummary: emptySummary, error: "", loading: true });
        const [query, setQuery] = useState(""), [region, setRegion] = useState("All"), [bedroom, setBedroom] = useState("studio"), [maxRent, setMaxRent] = useState("");
        const [minFloors, setMinFloors] = useState(12), [onlyLeasing, setOnlyLeasing] = useState(false), [onlyFlagged, setOnlyFlagged] = useState(false);
        const [view, setView] = useState("grid"), [selectedId, setSelectedId] = useState(""), [sourceInput, setSourceInput] = useState(""), [queue, setQueue] = useState([]);
        useEffect(() => { let alive = true; loadData().then((result) => alive && setData({ ...result, loading: false })); return () => { alive = false; }; }, []);
        useEffect(() => { if (data.properties.length && !selectedId) setSelectedId(data.properties[0].id); }, [data.properties, selectedId]);
        const regions = useMemo(() => ["All", ...new Set(data.properties.map((p) => p.region))], [data.properties]);
        const filtered = useMemo(() => {
          const q = query.trim().toLowerCase(), max = Number(maxRent);
          return data.properties.filter((p) => {
            const haystack = [p.name, p.address, p.city, p.region, p.neighborhood, p.owner, p.tags.join(" ")].join(" ").toLowerCase();
            return (!q || haystack.includes(q)) && (region === "All" || p.region === region) && p.floors >= Number(minFloors || 0) && (!maxRent || p.rentBand[bedroom] <= max) && (!onlyLeasing || p.leasingUrl) && (!onlyFlagged || p.dataQuality.needsVerification.length);
          });
        }, [data.properties, query, region, bedroom, maxRent, minFloors, onlyLeasing, onlyFlagged]);
        const selected = filtered.find((p) => p.id === selectedId) || filtered[0];
        const stats = useMemo(() => {
          const rents = filtered.map((p) => p.rentBand[bedroom]).filter(Boolean);
          return { avgRent: rents.length ? Math.round(rents.reduce((a, b) => a + b, 0) / rents.length) : 0, avgFloors: filtered.length ? Math.round(filtered.reduce((a, p) => a + p.floors, 0) / filtered.length) : 0, leasing: filtered.filter((p) => p.leasingUrl).length, flagged: filtered.filter((p) => p.dataQuality.needsVerification.length).length };
        }, [filtered, bedroom]);
        const addQueue = () => {
          const urls = sourceInput.split(/\n|,/).map((u) => u.trim()).filter(Boolean);
          if (!urls.length) return;
          setQueue((old) => [...urls.map((url, i) => ({ id: `${Date.now()}-${i}`, url, status: /newportrentals|journaljc|equityapartments|avaloncommunities|relatedrentals|gotham/i.test(url) ? "Supported source, needs backend scraper" : "Unknown source, manual mapping needed" })), ...old]);
          setSourceInput("");
        };
        return html`
          <${React.Fragment}>
            <header className="topbar">
              <div className="brand"><div className="mark">PV</div><div><p className="eyebrow">PropertyVault</p><h1>NYC and Downtown JC luxury rental inventory</h1></div></div>
              <nav className="actions">${["grid", "table", "map"].map((v) => html`<button className=${view === v ? "icon-button active" : "icon-button"} onClick=${() => setView(v)} aria-label=${`${v} view`}>${v === "grid" ? "G" : v === "table" ? "T" : "M"}</button>`)}<button className="primary" onClick=${() => csv(filtered)}>Export</button></nav>
            </header>
            <main>
              <section className="hero"><div className="hero-copy"><p className="eyebrow">One searchable vault for the towers everyone hides separately</p><h2>High-rise rental buildings, leasing links, map search, and every missing-data flag.</h2><p>Built from NYC MapPLUTO and Downtown Jersey City open map data. Live asking rents are estimated until a direct leasing feed is connected, and every gap is surfaced.</p></div><div className="source-card"><div><span className="metric">${num.format(data.coverageSummary.totalProperties)}</span><span className="label">high-rise records</span></div><div><span className="metric">${num.format(data.coverageSummary.withKnownLeasingSource)}</span><span className="label">known leasing sources</span></div><div><span className="metric">${num.format(data.coverageSummary.flaggedForVerification)}</span><span className="label">flagged for follow-up</span></div><p>${data.loading ? "Loading latest public building inventory..." : `Generated ${new Date(data.generatedAt).toLocaleDateString()} from public building inventory.`}</p>${data.error && html`<p className="load-note">Live source fetch fell back to curated starter data: ${data.error}</p>`}</div></section>
              <section className="workbench">
                <aside className="filters"><div className="heading"><h2>Search</h2><button className="ghost" onClick=${() => { setQuery(""); setRegion("All"); setBedroom("studio"); setMaxRent(""); setMinFloors(12); setOnlyLeasing(false); setOnlyFlagged(false); }}>Reset</button></div><label className="field"><span>Building, neighborhood, owner</span><input value=${query} onInput=${(e) => setQuery(e.target.value)} placeholder="Hudson Yards, Newport, 8 Spruce..." /></label><label className="field"><span>Market</span><select value=${region} onChange=${(e) => setRegion(e.target.value)}>${regions.map((r) => html`<option value=${r}>${r}</option>`)}</select></label><div className="two"><label className="field"><span>Rent type</span><select value=${bedroom} onChange=${(e) => setBedroom(e.target.value)}>${bedroomOptions.map(([v, l]) => html`<option value=${v}>${l}</option>`)}</select></label><label className="field"><span>Max rent</span><input type="number" value=${maxRent} onInput=${(e) => setMaxRent(e.target.value)} placeholder="6500" /></label></div><label className="field"><span>Minimum floors: ${minFloors}</span><input type="range" min="12" max="85" value=${minFloors} onInput=${(e) => setMinFloors(e.target.value)} /></label><label className="check"><input type="checkbox" checked=${onlyLeasing} onChange=${(e) => setOnlyLeasing(e.target.checked)} /><span>Only records with known leasing links</span></label><label className="check"><input type="checkbox" checked=${onlyFlagged} onChange=${(e) => setOnlyFlagged(e.target.checked)} /><span>Only show records that need verification</span></label><div className="queue"><h3>Add source links to verify</h3><textarea value=${sourceInput} onInput=${(e) => setSourceInput(e.target.value)} placeholder="Paste building leasing pages here, one per line"></textarea><button className="primary" onClick=${addQueue}>Queue review</button></div></aside>
                <section className="results"><${Stats} filtered=${filtered} stats=${stats} bedroom=${bedroom} />${view === "grid" && html`<${Grid} rows=${filtered} selectedId=${selected?.id} setSelectedId=${setSelectedId} bedroom=${bedroom} />`}${view === "table" && html`<${Table} rows=${filtered} selectedId=${selected?.id} setSelectedId=${setSelectedId} bedroom=${bedroom} />`}${view === "map" && html`<${MapView} rows=${filtered} selected=${selected} setSelectedId=${setSelectedId} bedroom=${bedroom} />`}</section>
              </section>
              <section className="detail-band"><${Detail} property=${selected} bedroom=${bedroom} /><${Coverage} summary=${data.coverageSummary} queue=${queue} /></section>
            </main>
          <//>`;
      }
      function Stats({ filtered, stats, bedroom }) {
        return html`<div className="stats"><div><strong>${num.format(filtered.length)}</strong><span>matching properties</span></div><div><strong>${money.format(stats.avgRent)}</strong><span>avg ${bedroomOptions.find(([v]) => v === bedroom)?.[1]} estimate</span></div><div><strong>${stats.avgFloors}</strong><span>avg floors</span></div><div><strong>${stats.leasing}</strong><span>with leasing URL</span></div><div><strong>${stats.flagged}</strong><span>flagged records</span></div></div>`;
      }
      function Grid({ rows, selectedId, setSelectedId, bedroom }) {
        return html`<div className="cards">${rows.slice(0, 120).map((p) => html`<button className=${p.id === selectedId ? "property-card selected" : "property-card"} onClick=${() => setSelectedId(p.id)}><span className="pill">${p.region}</span><h3>${p.name}</h3><p>${p.address || p.neighborhood}</p><div className="card-metrics"><span>${p.floors} floors</span><span>${p.units ? num.format(p.units) : "?"} units</span><span>${money.format(p.rentBand[bedroom])}</span></div><div className="tags">${p.leasingUrl ? html`<span className="good">Leasing link</span>` : html`<span className="warn">Needs rent feed</span>`}${p.dataQuality.needsVerification.slice(0, 2).map((f) => html`<span>${f}</span>`)}</div></button>`)}</div>`;
      }
      function Table({ rows, selectedId, setSelectedId, bedroom }) {
        return html`<div className="table-wrap"><table><thead><tr><th>Building</th><th>Market</th><th>Floors</th><th>Units</th><th>${bedroomOptions.find(([v]) => v === bedroom)?.[1]}</th><th>Data status</th></tr></thead><tbody>${rows.slice(0, 500).map((p) => html`<tr className=${p.id === selectedId ? "selected-row" : ""} onClick=${() => setSelectedId(p.id)}><td><strong>${p.name}</strong><span>${p.address}</span></td><td>${p.region}</td><td>${p.floors}</td><td>${p.units ? num.format(p.units) : "Flagged"}</td><td>${money.format(p.rentBand[bedroom])}</td><td>${p.leasingUrl ? html`<span className="status good">leasing source</span>` : html`<span className="status warn">verify rent feed</span>`}</td></tr>`)}</tbody></table></div>`;
      }
      function MapView({ rows, selected, setSelectedId, bedroom }) {
        const bounds = useMemo(() => {
          const lats = rows.map((p) => p.latitude), lons = rows.map((p) => p.longitude);
          return { minLat: Math.min(...lats), maxLat: Math.max(...lats), minLon: Math.min(...lons), maxLon: Math.max(...lons) };
        }, [rows]);
        const project = (p) => ({ x: ((p.longitude - bounds.minLon) / (bounds.maxLon - bounds.minLon || 1)) * 100, y: 100 - ((p.latitude - bounds.minLat) / (bounds.maxLat - bounds.minLat || 1)) * 100 });
        return html`<div className="map-layout"><div className="map"><div className="map-label manhattan">Manhattan</div><div className="map-label jersey">Downtown JC</div>${rows.slice(0, 900).map((p) => { const point = project(p), size = Math.max(7, Math.min(18, p.floors / 3)); return html`<button className=${selected?.id === p.id ? "point active" : p.leasingUrl ? "point sourced" : "point"} style=${{ left: `${point.x}%`, top: `${point.y}%`, width: `${size}px`, height: `${size}px` }} title=${`${p.name} - ${p.floors} floors`} onClick=${() => setSelectedId(p.id)}></button>`; })}</div><div className="map-side"><h3>${selected?.name || "Select a property"}</h3>${selected && html`<p>${selected.address || selected.neighborhood}</p><div className="mini"><span>${selected.floors} floors</span><span>${selected.units ? num.format(selected.units) : "units flagged"}</span><span>${money.format(selected.rentBand[bedroom])}</span></div><p>${selected.source}</p>`}</div></div>`;
      }
      function Detail({ property, bedroom }) {
        if (!property) return html`<article className="detail-card"><h2>Loading property inventory</h2><p>Pulling public high-rise records now.</p></article>`;
        return html`<article className="detail-card"><div className="detail-head"><div><p className="eyebrow">${property.region} / ${property.neighborhood}</p><h2>${property.name}</h2><p>${property.address || property.city}</p></div><div className="rent"><strong>${money.format(property.rentBand[bedroom])}</strong><span>estimated ${bedroomOptions.find(([v]) => v === bedroom)?.[1]}</span></div></div><div className="detail-grid"><span><strong>${property.floors}</strong> floors</span><span><strong>${property.units ? num.format(property.units) : "Flagged"}</strong> units</span><span><strong>${property.yearBuilt || "Flagged"}</strong> year built</span><span><strong>${property.owner || "Flagged"}</strong> owner</span></div><div className="amenities">${property.amenities.map((a) => html`<span>${a}</span>`)}</div><div className="detail-actions">${property.leasingUrl ? html`<a className="primary" href=${property.leasingUrl} target="_blank" rel="noreferrer">Open leasing source</a>` : html`<span className="empty-source">No direct leasing source attached yet</span>`}<a className="ghost" href=${property.sourceUrl} target="_blank" rel="noreferrer">Public source</a></div></article>`;
      }
      function Coverage({ summary, queue }) {
        return html`<aside className="coverage"><h2>Coverage Flags</h2><p>${summary.caveat}</p><div className="region-list">${Object.entries(summary.byRegion).sort((a, b) => b[1] - a[1]).map(([name, count]) => html`<div><span>${name}</span><strong>${num.format(count)}</strong></div>`)}</div><h3>Queued source checks</h3><div className="queue-list">${queue.length ? queue.slice(0, 6).map((item) => html`<div><strong>${item.status}</strong><span>${item.url}</span></div>`) : html`<p>No extra sources queued yet.</p>`}</div></aside>`;
      }
      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
