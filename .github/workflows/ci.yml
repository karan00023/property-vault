name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: propertyvault
          POSTGRES_USER: propertyvault
          POSTGRES_PASSWORD: propertyvault
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U propertyvault"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://propertyvault:propertyvault@localhost:5432/propertyvault
      AUTH_SECRET: ci-auth-secret-that-is-at-least-thirty-two-bytes
      MFA_ENCRYPTION_KEY: ci-mfa-secret-that-is-at-least-thirty-two-bytes
      EMAIL_SERVER: smtp://localhost:1025
      EMAIL_FROM: ci@propertyvault.test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:validate
      - run: npm run db:migrate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run db:rollback
